function parseData(iso) {
  const [y, m, d] = iso.split("-").map(Number);
  return { y, m, d };
}

function ordinalIdade(idade) {
  return idade + (idade === 1 ? " ano" : " anos");
}

const MILITARES = MILITARES_RAW.map(([nome, posto, nascimento, lotacao, funcao, matricula]) => {
  const { y, m, d } = parseData(nascimento);
  return { nome, posto, nascimento, lotacao, funcao, matricula, nascY: y, nascM: m, nascD: d };
});

function diasAteAniversario(nascM, nascD, hoje) {
  const anoAtual = hoje.getFullYear();
  let prox = new Date(anoAtual, nascM - 1, nascD);
  prox.setHours(0, 0, 0, 0);
  const hojeZero = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());
  if (prox < hojeZero) {
    prox = new Date(anoAtual + 1, nascM - 1, nascD);
  }
  const diffMs = prox - hojeZero;
  return Math.round(diffMs / 86400000);
}

function nomeCaixaMista(nomeCompleto) {
  return nomeCompleto
    .split(" ")
    .map((w) => {
      const minus = ["da", "de", "do", "das", "dos", "e"];
      const lw = w.toLowerCase();
      if (minus.includes(lw)) return lw;
      return lw.charAt(0).toUpperCase() + lw.slice(1);
    })
    .join(" ");
}

function copiarTexto(text, onDone) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(onDone).catch(() => fallbackCopy(text, onDone));
  } else {
    fallbackCopy(text, onDone);
  }
}
function fallbackCopy(text, onDone) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.left = "-9999px";
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand("copy"); } catch (e) {}
  document.body.removeChild(ta);
  onDone();
}

function CopyButton({ text }) {
  const [copied, setCopied] = useState(false);
  return (
    <button
      onClick={() => copiarTexto(text, () => { setCopied(true); setTimeout(() => setCopied(false), 1800); })}
      style={{
        display: "flex",
        alignItems: "center",
        gap: 6,
        background: copied ? "#2E7D32" : "#1F3864",
        color: "#fff",
        border: "none",
        borderRadius: 6,
        padding: "6px 12px",
        fontSize: 13,
        fontWeight: 600,
        cursor: "pointer",
      }}
    >
      {copied ? "✓ Copiado!" : "⧉ Copiar texto"}
    </button>
  );
}

function fitText(ctx, text, maxWidth, initialSize, weight = "bold") {
  let size = initialSize;
  ctx.font = `${weight} ${size}px Arial`;
  while (ctx.measureText(text).width > maxWidth && size > 22) {
    size -= 2;
    ctx.font = `${weight} ${size}px Arial`;
  }
  return size;
}

function CardOficialGenerator({ m, idade }) {
  const canvasRef = useRef(null);
  const [photoSrc, setPhotoSrc] = useState(null);
  const [pronta, setPronta] = useState(false);
  const brasaoImgRef = useRef(null);
  const brasaoGeralRef = useRef(null);

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    setPronta(false);
    const reader = new FileReader();
    reader.onload = (ev) => setPhotoSrc(ev.target.result);
    reader.readAsDataURL(file);
  }

  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    const W = 1080, H = 1350;

    function desenhar(fotoImg) {
      // fundo com gradiente radial azul-marinho
      const grad = ctx.createRadialGradient(W / 2, H * 0.42, 80, W / 2, H * 0.42, 900);
      grad.addColorStop(0, "#233b6b");
      grad.addColorStop(1, "#0e1b38");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      // moldura dourada dupla
      ctx.strokeStyle = "#cda43f";
      ctx.lineWidth = 3;
      ctx.strokeRect(34, 34, W - 68, H - 68);
      ctx.lineWidth = 1.5;
      ctx.strokeRect(44, 44, W - 88, H - 88);

      // faixa vermelha (ribbon)
      const ribbonY = 88, ribbonH = 78, ribbonX1 = 128, ribbonX2 = W - 128;
      ctx.fillStyle = "#a11c22";
      // ponta esquerda
      ctx.beginPath();
      ctx.moveTo(ribbonX1, ribbonY);
      ctx.lineTo(ribbonX1 - 42, ribbonY + ribbonH / 2);
      ctx.lineTo(ribbonX1, ribbonY + ribbonH);
      ctx.closePath();
      ctx.fill();
      // ponta direita
      ctx.beginPath();
      ctx.moveTo(ribbonX2, ribbonY);
      ctx.lineTo(ribbonX2 + 42, ribbonY + ribbonH / 2);
      ctx.lineTo(ribbonX2, ribbonY + ribbonH);
      ctx.closePath();
      ctx.fill();
      // corpo retangular
      ctx.fillRect(ribbonX1, ribbonY, ribbonX2 - ribbonX1, ribbonH);
      // linhas douradas finas
      ctx.strokeStyle = "#cda43f";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ribbonX1, ribbonY + 6);
      ctx.lineTo(ribbonX2, ribbonY + 6);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ribbonX1, ribbonY + ribbonH - 6);
      ctx.lineTo(ribbonX2, ribbonY + ribbonH - 6);
      ctx.stroke();
      // textos da faixa
      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.font = "bold 27px Arial";
      ctx.fillText("CORPO DE BOMBEIROS MILITAR DE PERNAMBUCO", W / 2, ribbonY + 34);
      ctx.font = "20px Arial";
      ctx.fillText("2º GRUPAMENTO DE BOMBEIROS", W / 2, ribbonY + 62);

      // moldura circular da foto
      const cx = W / 2, cy = 560, rOuter = 300, rMat = 286, rPhoto = 268;
      ctx.beginPath();
      ctx.arc(cx, cy, rOuter, 0, Math.PI * 2);
      ctx.lineWidth = 7;
      ctx.strokeStyle = "#cda43f";
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(cx, cy, rMat, 0, Math.PI * 2);
      ctx.lineWidth = 2;
      ctx.strokeStyle = "#cda43f";
      ctx.stroke();

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, rPhoto, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();
      if (fotoImg) {
        const ratio = Math.max((rPhoto * 2) / fotoImg.width, (rPhoto * 2) / fotoImg.height);
        const iw = fotoImg.width * ratio, ih = fotoImg.height * ratio;
        ctx.drawImage(fotoImg, cx - iw / 2, cy - ih / 2, iw, ih);
      } else {
        ctx.fillStyle = "#ece7da";
        ctx.fillRect(cx - rPhoto, cy - rPhoto, rPhoto * 2, rPhoto * 2);
        // icone de pessoa
        ctx.fillStyle = "#a49d85";
        ctx.beginPath();
        ctx.arc(cx, cy - 55, 62, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy + 120, 130, Math.PI, 0, false);
        ctx.fill();
        ctx.fillStyle = "#7c7560";
        ctx.font = "bold 24px Arial";
        ctx.fillText("SUBSTITUA A FOTO", cx, cy + 100);
      }
      ctx.restore();

      // divisor
      const dy = 870;
      ctx.strokeStyle = "#cda43f";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx - 170, dy);
      ctx.lineTo(cx - 40, dy);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx + 40, dy);
      ctx.lineTo(cx + 170, dy);
      ctx.stroke();
      ctx.save();
      ctx.translate(cx, dy);
      ctx.rotate(Math.PI / 4);
      ctx.fillStyle = "#cda43f";
      ctx.fillRect(-9, -9, 18, 18);
      ctx.restore();

      // titulo
      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 72px Arial";
      ctx.fillText("FELIZ ANIVERSÁRIO!", cx, 955);

      // nome
      const nomeTxt = `${(m.posto || "").toUpperCase()} ${nomeCaixaMista(m.nome).toUpperCase()}`;
      ctx.fillStyle = "#e2bd63";
      const nomeSize = fitText(ctx, nomeTxt, W - 140, 44);
      ctx.font = `bold ${nomeSize}px Arial`;
      ctx.fillText(nomeTxt, cx, 1010);

      // frase
      ctx.fillStyle = "#d8dce6";
      ctx.font = "27px Arial";
      ctx.fillText("Gratidão por servir com coragem, disciplina e amor à vida.", cx, 1055);

      // lema
      ctx.fillStyle = "#e2bd63";
      ctx.font = "bold 33px Arial";
      ctx.fillText("VIDAS ALHEIAS, RIQUEZAS SALVAR", cx, 1100);

      // brasões (selo geral à esquerda, escudo 2ºGB à direita)
      const brasaoGeral = brasaoGeralRef.current;
      if (brasaoGeral) {
        const bs2 = 150;
        const bx2 = 90, by2 = 1140;
        ctx.drawImage(brasaoGeral, bx2, by2, bs2, bs2);
      }
      const brasao = brasaoImgRef.current;
      if (brasao) {
        const bs = 150;
        const bx = W - 90 - bs, by = 1140;
        ctx.drawImage(brasao, bx, by, bs, bs);
      }

      setPronta(true);
    }

    function tudoCarregado() {
      return brasaoImgRef.current && brasaoGeralRef.current;
    }

    function tentarDesenhar() {
      if (!tudoCarregado()) return;
      if (photoSrc) {
        const img = new Image();
        img.onload = () => desenhar(img);
        img.src = photoSrc;
      } else {
        desenhar(null);
      }
    }

    if (!brasaoImgRef.current) {
      const b = new Image();
      b.onload = () => {
        brasaoImgRef.current = b;
        tentarDesenhar();
      };
      b.src = BRASAO_2GB;
    }
    if (!brasaoGeralRef.current) {
      const g = new Image();
      g.onload = () => {
        brasaoGeralRef.current = g;
        tentarDesenhar();
      };
      g.src = BRASAO_CBMPE_GERAL;
    }
    if (tudoCarregado()) {
      tentarDesenhar();
    }
  }, [photoSrc, m, idade]);

  function baixar() {
    const canvas = canvasRef.current;
    const link = document.createElement("a");
    const slug = m.nome.split(" ")[0].toLowerCase();
    link.download = `card_oficial_${slug}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
  }

  return (
    <div style={{ background: "#F7F7F5", borderRadius: 8, padding: 10, marginTop: 12 }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: "#1F3864", marginBottom: 8, textTransform: "uppercase", letterSpacing: 0.5 }}>
        Card oficial 2ºGB (modelo institucional)
      </div>
      <div style={{ display: "flex", gap: 14, flexWrap: "wrap", alignItems: "flex-start" }}>
        <div>
          <label
            style={{
              display: "inline-block",
              background: "#1F3864",
              color: "#fff",
              borderRadius: 6,
              padding: "8px 12px",
              fontSize: 12.5,
              fontWeight: 600,
              cursor: "pointer",
            }}
          >
            📷 Escolher foto do militar
            <input type="file" accept="image/*" onChange={handleFile} style={{ display: "none" }} />
          </label>
          {pronta && (
            <button
              onClick={baixar}
              style={{
                display: "block",
                marginTop: 8,
                background: "#2E7D32",
                color: "#fff",
                border: "none",
                borderRadius: 6,
                padding: "8px 12px",
                fontSize: 12.5,
                fontWeight: 600,
                cursor: "pointer",
              }}
            >
              ⬇ Baixar imagem (PNG)
            </button>
          )}
          <div style={{ fontSize: 11.5, color: "#999", marginTop: 8, maxWidth: 190 }}>
            {photoSrc ? "Pré-visualização abaixo — pode baixar." : "Prévia sem foto abaixo. Escolha uma foto para substituir."}
          </div>
        </div>
        <canvas
          ref={canvasRef}
          width={1080}
          height={1350}
          style={{
            width: 160,
            height: 200,
            borderRadius: 8,
            border: "1px solid #ddd",
            background: "#fff",
          }}
        />
      </div>
    </div>
  );
}

      grad.addColorStop(1, "#0e1b38");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);

      ctx.strokeStyle = "#cda43f";
      ctx.lineWidth = 3;
      ctx.strokeRect(34, 34, W - 68, H - 68);
      ctx.lineWidth = 1.5;
      ctx.strokeRect(44, 44, W - 88, H - 88);

      const ribbonY = 88, ribbonH = 78, ribbonX1 = 128, ribbonX2 = W - 128;
      ctx.fillStyle = "#a11c22";
      ctx.beginPath();
      ctx.moveTo(ribbonX1, ribbonY);
      ctx.lineTo(ribbonX1 - 42, ribbonY + ribbonH / 2);
      ctx.lineTo(ribbonX1, ribbonY + ribbonH);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(ribbonX2, ribbonY);
      ctx.lineTo(ribbonX2 + 42, ribbonY + ribbonH / 2);
      ctx.lineTo(ribbonX2, ribbonY + ribbonH);
      ctx.closePath();
      ctx.fill();
      ctx.fillRect(ribbonX1, ribbonY, ribbonX2 - ribbonX1, ribbonH);
      ctx.strokeStyle = "#cda43f";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(ribbonX1, ribbonY + 6);
      ctx.lineTo(ribbonX2, ribbonY + 6);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ribbonX1, ribbonY + ribbonH - 6);
      ctx.lineTo(ribbonX2, ribbonY + ribbonH - 6);
      ctx.stroke();
      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.font = "bold 27px Arial";
      ctx.fillText("CORPO DE BOMBEIROS MILITAR DE PERNAMBUCO", W / 2, ribbonY + 34);
      ctx.font = "20px Arial";
      ctx.fillText("2º GRUPAMENTO DE BOMBEIROS", W / 2, ribbonY + 62);

      const cx = W / 2, cy = 560, rOuter = 300, rMat = 286, rPhoto = 268;
      ctx.beginPath();
      ctx.arc(cx, cy, rOuter, 0, Math.PI * 2);
      ctx.lineWidth = 7;
      ctx.strokeStyle = "#cda43f";
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(cx, cy, rMat, 0, Math.PI * 2);
      ctx.lineWidth = 2;
      ctx.strokeStyle = "#cda43f";
      ctx.stroke();

      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, rPhoto, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();
      if (fotoImg) {
        const ratio = Math.max((rPhoto * 2) / fotoImg.width, (rPhoto * 2) / fotoImg.height);
        const iw = fotoImg.width * ratio, ih = fotoImg.height * ratio;
        ctx.drawImage(fotoImg, cx - iw / 2, cy - ih / 2, iw, ih);
      } else {
        ctx.fillStyle = "#ece7da";
        ctx.fillRect(cx - rPhoto, cy - rPhoto, rPhoto * 2, rPhoto * 2);
        ctx.fillStyle = "#a49d85";
        ctx.beginPath();
        ctx.arc(cx, cy - 55, 62, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(cx, cy + 120, 130, Math.PI, 0, false);
        ctx.fill();
        ctx.fillStyle = "#7c7560";
        ctx.font = "bold 24px Arial";
        ctx.fillText("SUBSTITUA A FOTO", cx, cy + 100);
      }
      ctx.restore();

      const dy = 870;
      ctx.strokeStyle = "#cda43f";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx - 170, dy);
      ctx.lineTo(cx - 40, dy);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx + 40, dy);
      ctx.lineTo(cx + 170, dy);
      ctx.stroke();
      ctx.save();
      ctx.translate(cx, dy);
      ctx.rotate(Math.PI / 4);
      ctx.fillStyle = "#cda43f";
      ctx.fillRect(-9, -9, 18, 18);
      ctx.restore();

      ctx.fillStyle = "#ffffff";
      ctx.font = "bold 72px Arial";
      ctx.fillText("FELIZ ANIVERSÁRIO!", cx, 955);

      const nomeTxt = `${(posto || "").toUpperCase()} ${nome.toUpperCase()}`.trim();
      ctx.fillStyle = "#e2bd63";
      const nomeSize = fitText(ctx, nomeTxt, W - 140, 44);
      ctx.font = `bold ${nomeSize}px Arial`;
      ctx.fillText(nomeTxt, cx, 1010);

      ctx.fillStyle = "#d8dce6";
      ctx.font = "27px Arial";
      ctx.fillText("Gratidão por servir com coragem, disciplina e amor à vida.", cx, 1055);

      ctx.fillStyle = "#e2bd63";
      ctx.font = "bold 33px Arial";
      ctx.fillText("VIDAS ALHEIAS, RIQUEZAS SALVAR", cx, 1100);

      const brasaoGeral = brasaoGeralRef.current;
      if (brasaoGeral) {
        const bs2 = 150;
        const bx2 = 90, by2 = 1140;
        ctx.drawImage(brasaoGeral, bx2, by2, bs2, bs2);
      }
      const brasao = brasaoImgRef.current;
      if (brasao) {
        const bs = 150;
        const bx = W - 90 - bs, by = 1140;
        ctx.drawImage(brasao, bx, by, bs, bs);
      }

      setPronta(true);
    }

    function tudoCarregado() {
      return brasaoImgRef.current && brasaoGeralRef.current;
    }

    function tentarDesenhar() {
      if (!tudoCarregado()) return;
      if (photoSrc) {
        const img = new Image();
        img.onload = () => desenhar(img);
        img.src = photoSrc;
      } else {
        desenhar(null);
      }
    }

    if (!brasaoImgRef.current) {
      const b = new Image();
      b.onload = () => {
        brasaoImgRef.current = b;
        tentarDesenhar();
      };
      b.src = BRASAO_2GB;
    }
    if (!brasaoGeralRef.current) {
      const g = new Image();
      g.onload = () => {
        brasaoGeralRef.current = g;
        tentarDesenhar();
      };
      g.src = BRASAO_CBMPE_GERAL;
    }
    if (tudoCarregado()) {
      tentarDesenhar();
    }
  }, [photoSrc, posto, nome]);

  function baixar() {
    const canvas = canvasRef.current;
    const link = document.createElement("a");
    const slug = (nome.split(" ")[0] || "militar").toLowerCase();
    link.download = `card_personalizado_${slug}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
  }

  return (
    <div style={{ background: "#fff", borderRadius: 12, padding: 16, border: "1px solid #EEE", marginBottom: 24 }}>
      <div style={{ fontSize: 15, fontWeight: 800, color: "#1F3864", marginBottom: 4 }}>
        🎨 Gerar card personalizado
      </div>
      <div style={{ fontSize: 12.5, color: "#888", marginBottom: 14 }}>
        Para qualquer militar (mesmo fora da lista): informe graduação, nome e a foto.
      </div>
      <div style={{ display: "flex", gap: 16, flexWrap: "wrap", alignItems: "flex-start" }}>
        <div style={{ flex: "1 1 220px", display: "flex", flexDirection: "column", gap: 10 }}>
          <div>
            <label style={{ fontSize: 12, fontWeight: 600, color: "#333", display: "block", marginBottom: 4 }}>
              Graduação
            </label>
            <input
              value={posto}
              onChange={(e) => setPosto(e.target.value)}
              placeholder="Ex: 3º Sgt, Cb, Sd..."
              style={{ width: "100%", padding: "8px 10px", borderRadius: 7, border: "1px solid #ccc", fontSize: 13, boxSizing: "border-box" }}
            />
          </div>
          <div>
            <label style={{ fontSize: 12, fontWeight: 600, color: "#333", display: "block", marginBottom: 4 }}>
              Nome do militar
            </label>
            <input
              value={nome}
              onChange={(e) => setNome(e.target.value)}

              style={{ width: "100%", padding: "8px 10px", borderRadius: 7, border: "1px solid #ccc", fontSize: 13, boxSizing: "border-box" }}
            />
          </div>
          <div>

                display: "inline-flex",
                alignItems: "center",
                gap: 6,
                background: "#1F3864",
                color: "#fff",
                borderRadius: 6,
                padding: "8px 12px",
                fontSize: 12.5,

                cursor: "pointer",
              }}
            >

            </label>

          )}

        <canvas

            background: "#fff",
            display: nome.trim() ? "block" : "none",
          }}

      </div>
    </div>
  );
}


function ImageCardGenerator({ m, idade }) {
  const canvasRef = useRef(null);
  const [photoSrc, setPhotoSrc] = useState(null);
  const [pronta, setPronta] = useState(false);

  function handleFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    setPronta(false);
    const reader = new FileReader();
    reader.onload = (ev) => setPhotoSrc(ev.target.result);
    reader.readAsDataURL(file);
  }

  useEffect(() => {
    if (!photoSrc) return;
    const canvas = canvasRef.current;
    const ctx = canvas.getContext("2d");
    const W = canvas.width, H = canvas.height;
    const img = new Image();
    img.onload = () => {
      ctx.clearRect(0, 0, W, H);
      // fundo
      ctx.fillStyle = "#F4F1EA";
      ctx.fillRect(0, 0, W, H);

      // barra superior
      ctx.fillStyle = "#1F3864";
      ctx.fillRect(0, 0, W, 130);
      ctx.fillStyle = "#fff";
      ctx.textAlign = "center";
      ctx.font = "bold 30px Arial";
      ctx.fillText("CBMPE · 2º GRUPAMENTO DE BOMBEIROS", W / 2, 80);

      // título
      ctx.fillStyle = "#C0621B";
      const tituloSize = fitText(ctx, "FELIZ ANIVERSÁRIO! 🎉", W - 100, 68);
      ctx.font = `bold ${tituloSize}px Arial`;
      ctx.fillText("FELIZ ANIVERSÁRIO! 🎉", W / 2, 250);

      // foto circular
      const size = 420;
      const cx = W / 2, cy = 540;
      ctx.save();
      ctx.beginPath();
      ctx.arc(cx, cy, size / 2, 0, Math.PI * 2);
      ctx.closePath();
      ctx.clip();
      const ratio = Math.max(size / img.width, size / img.height);
      const iw = img.width * ratio, ih = img.height * ratio;
      ctx.drawImage(img, cx - iw / 2, cy - ih / 2, iw, ih);
      ctx.restore();
      ctx.lineWidth = 10;
      ctx.strokeStyle = "#7B241C";
      ctx.beginPath();
      ctx.arc(cx, cy, size / 2, 0, Math.PI * 2);
      ctx.stroke();

      // nome
      const nomeTxt = `${m.posto} ${nomeCaixaMista(m.nome)}`;
      ctx.fillStyle = "#1F3864";
      const nomeSize = fitText(ctx, nomeTxt, W - 90, 46);
      ctx.font = `bold ${nomeSize}px Arial`;
      ctx.fillText(nomeTxt, W / 2, 830);

      // lotação/idade
      const subTxt = `${m.lotacao ? m.lotacao + " · " : ""}completa ${ordinalIdade(idade)}`;
      ctx.fillStyle = "#555";
      ctx.font = "30px Arial";
      ctx.fillText(subTxt, W / 2, 875);

      // rodapé
      ctx.fillStyle = "#7B241C";
      ctx.fillRect(0, H - 85, W, 85);
      ctx.fillStyle = "#fff";
      ctx.font = "26px Arial";
      ctx.fillText("#CBMPE   #2ºGB   #BombeirosPE", W / 2, H - 34);

      setPronta(true);
    };
    img.src = photoSrc;
  }, [photoSrc, m, idade]);

  function baixar() {
    const canvas = canvasRef.current;
    const link = document.createElement("a");
    const slug = m.nome.split(" ")[0].toLowerCase();
    link.download = `aniversario_${slug}.png`;
    link.href = canvas.toDataURL("image/png");
    link.click();
  }

  return (
    <div style={{ background: "#F7F7F5", borderRadius: 8, padding: 10, marginTop: 12 }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: "#1F3864", marginBottom: 8, textTransform: "uppercase", letterSpacing: 0.5 }}>
        Card genérico (alternativo, sem moldura institucional)
      </div>
      <div style={{ display: "flex", gap: 14, flexWrap: "wrap", alignItems: "flex-start" }}>
        <div>
          <label
            style={{
              display: "inline-block",
              background: "#1F3864",
              color: "#fff",
              borderRadius: 6,
              padding: "8px 12px",
              fontSize: 12.5,
              fontWeight: 600,
              cursor: "pointer",
            }}
          >
            📷 Escolher foto do militar
            <input type="file" accept="image/*" onChange={handleFile} style={{ display: "none" }} />
          </label>
          {pronta && (
            <button
              onClick={baixar}
              style={{
                display: "block",
                marginTop: 8,
                background: "#2E7D32",
                color: "#fff",
                border: "none",
                borderRadius: 6,
                padding: "8px 12px",
                fontSize: 12.5,
                fontWeight: 600,
                cursor: "pointer",
              }}
            >
              ⬇ Baixar imagem (PNG)
            </button>
          )}
          {!photoSrc && (
            <div style={{ fontSize: 11.5, color: "#999", marginTop: 8, maxWidth: 190 }}>
              Escolha uma foto para gerar o card pronto para postar no WhatsApp.
            </div>
          )}
        </div>
        <canvas
          ref={canvasRef}
          width={1080}
          height={1080}
          style={{
            width: 170,
            height: 170,
            borderRadius: 8,
            border: "1px solid #ddd",
            display: photoSrc ? "block" : "none",
            background: "#fff",
          }}
        />
      </div>
    </div>
  );
}

function PainelAniversarios() {
  const [hoje] = useState(() => new Date());
  const [busca, setBusca] = useState("");
  const [filtroLotacao, setFiltroLotacao] = useState("Todas");
  const [filtroMes, setFiltroMes] = useState("Todos");

  const lotacoes = useMemo(() => {
    const set = new Set(MILITARES.map((m) => m.lotacao).filter(Boolean));
    return ["Todas", ...Array.from(set).sort()];
  }, []);

  const comDistancia = useMemo(() => {
    return MILITARES.map((m) => {
      const dias = diasAteAniversario(m.nascM, m.nascD, hoje);
      const anoAtual = hoje.getFullYear();
      let anoAniversario = anoAtual;
      const proxData = new Date(anoAtual, m.nascM - 1, m.nascD);
      const hojeZero = new Date(hoje.getFullYear(), hoje.getMonth(), hoje.getDate());
      if (proxData < hojeZero) anoAniversario = anoAtual + 1;
      const idade = anoAniversario - m.nascY;
      return { ...m, dias, idade };
    }).sort((a, b) => a.dias - b.dias);
  }, [hoje]);

  const hojeLista = comDistancia.filter((m) => m.dias === 0);
  const amanhaLista = comDistancia.filter((m) => m.dias === 1);

  const filtrados = useMemo(() => {
    return comDistancia.filter((m) => {
      if (busca && !m.nome.toLowerCase().includes(busca.toLowerCase())) return false;
      if (filtroLotacao !== "Todas" && m.lotacao !== filtroLotacao) return false;
      if (filtroMes !== "Todos" && MESES[m.nascM - 1] !== filtroMes) return false;
      return true;
    });
  }, [comDistancia, busca, filtroLotacao, filtroMes]);

  const dataFormatada = hoje.toLocaleDateString("pt-BR", { weekday: "long", day: "2-digit", month: "long", year: "numeric" });

  return (
    <div style={{ fontFamily: "'Segoe UI', 'Helvetica Neue', Arial, sans-serif", background: "#F4F4F2", minHeight: "100vh", color: "#222" }}>
      <div style={{ background: "linear-gradient(90deg,#1F3864,#2A4D8F)", padding: "18px 24px", color: "#fff" }}>
        <div style={{ fontSize: 12, letterSpacing: 1.2, opacity: 0.85, textTransform: "uppercase" }}>
          CBMPE · 2º Grupamento de Bombeiros
        </div>
        <div style={{ fontSize: 22, fontWeight: 800, marginTop: 2 }}>
          🎂 Painel de Aniversários do Efetivo
        </div>
        <div style={{ fontSize: 13, opacity: 0.85, marginTop: 4, textTransform: "capitalize" }}>{dataFormatada}</div>
      </div>

      <div style={{ padding: "20px 24px", maxWidth: 980, margin: "0 auto" }}>
        <CardPersonalizadoManual />
        <div style={{ display: "grid", gridTemplateColumns: hojeLista.length && amanhaLista.length ? "1fr 1fr" : "1fr", gap: 16, marginBottom: 24 }}>
          <div style={{ background: "#fff", borderRadius: 12, padding: 16, border: "1px solid #EADFC8", boxShadow: "0 1px 4px rgba(0,0,0,0.05)" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
              <span style={{ fontWeight: 800, fontSize: 15, color: "#C0621B" }}>🎉 Hoje ({hojeLista.length})</span>
            </div>
            {hojeLista.length === 0 && <div style={{ fontSize: 13, color: "#888" }}>Nenhum aniversariante hoje.</div>}
            {hojeLista.map((m) => (
              <CardAniversariante key={m.matricula} m={m} idade={m.idade} destaque={true} />
            ))}
          </div>
          {amanhaLista.length > 0 && (
            <div style={{ background: "#fff", borderRadius: 12, padding: 16, border: "1px solid #EEE", boxShadow: "0 1px 4px rgba(0,0,0,0.05)" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                <span style={{ fontWeight: 800, fontSize: 15, color: "#7B241C" }}>🔔 Amanhã ({amanhaLista.length})</span>
              </div>
              {amanhaLista.map((m) => (
                <CardAniversariante key={m.matricula} m={m} idade={m.idade} />
              ))}
            </div>
          )}
        </div>

        <div style={{ background: "#fff", borderRadius: 12, padding: 16, border: "1px solid #EEE" }}>
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 14 }}>
            <div style={{ position: "relative", flex: "1 1 220px" }}>
              <input
                value={busca}
                onChange={(e) => setBusca(e.target.value)}
                placeholder="🔍 Buscar militar pelo nome..."
                style={{
                  width: "100%",
                  padding: "8px 10px",
                  borderRadius: 7,
                  border: "1px solid #ccc",
                  fontSize: 13,
                  boxSizing: "border-box",
                }}
              />
            </div>
            <select

              >
                <div>
                  <span style={{ fontWeight: 600, color: "#1F3864" }}>{m.posto}</span>{" "}
                  <span>{nomeCaixaMista(m.nome)}</span>
                  <div style={{ fontSize: 11.5, color: "#999" }}>{m.lotacao || "—"}</div>
                </div>
                <div style={{ textAlign: "right", whiteSpace: "nowrap" }}>
                  <div style={{ fontWeight: 700, color: m.dias === 0 ? "#C0621B" : m.dias === 1 ? "#7B241C" : "#444" }}>
                    {String(m.nascD).padStart(2, "0")}/{String(m.nascM).padStart(2, "0")}
                  </div>
                  <div style={{ fontSize: 11, color: "#999" }}>
                    {m.dias === 0 ? "hoje" : m.dias === 1 ? "amanhã" : `em ${m.dias} dias`}
                  </div>
                </div>
              </div>
            ))}
            {filtrados.length === 0 && (
              <div style={{ padding: 20, textAlign: "center", color: "#999", fontSize: 13 }}>
                Nenhum militar encontrado com esses filtros.
              </div>
            )}
          </div>
        </div>

        <div style={{ fontSize: 11.5, color: "#999", textAlign: "center", marginTop: 18, lineHeight: 1.5 }}>
          Protótipo gerado a partir da planilha BACKUP DO PECÚLIO 2ºGB (177 militares) · Fase 0 do Plano de Sistema de Gestão de Aniversários
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PainelAniversarios />);
</script>
</body>
</html>
